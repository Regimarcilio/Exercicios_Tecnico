<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link rel="stylesheet" href="style_login.css">
</head>
<body>
    <div class="fundo">
        <div class="bemVindo">
            <h1>Seja bem Vindo</h1>
            <p>Para conectar-se em sua conta, por favor entre com seus dados pessoais</p>
            <button class="entre">ACESSAR</button>
        </div>
        <div class="acessar">
            <h1>Crie sua conta</h1>
            <ul class="social">
                <li>f</li>
                <li>G+</li>
                <li>in</li>
            </ul>
            <p>Ou use seu email para acessar</p>
            <form id="acessar">
                <input type="text" id="nome"  placeholder="Ex Reginaldo Marcilio">
                    <span id="erro-nome"></span>
                <input type="text" id="email"  placeholder="Email Válido">
                    <span id="erro-email"></span>
                <input type="password" id="senha"  placeholder="Insira sua Senha">
                    <span id="erro-senha"></span>
            </form>
            <button class="acessar">ENTRE</button>
        </div>  
    </div>
</body>
</html>
